<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chatbot</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:wght@500;600;700&display=swap" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-mark">✦</span>
          <span class="logo-text">Chatbot</span>
        </div>
        <button class="icon-btn" id="newChatBtn" title="New conversation">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      </div>
      <div class="conversation-list" id="conversationList">
        <div class="empty-state">No conversations yet</div>
      </div>
      <div class="sidebar-footer">
        <div class="model-selector">
          <label for="modelSelect">Model</label>
          <select id="modelSelect">
            <option value="openai/gpt-4o-mini">GPT-4o mini</option>
            <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
            <option value="google/gemini-1.5-pro">Gemini 1.5 Pro</option>
          </select>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="main-header">
        <h1 id="conversationTitle">New conversation</h1>
        <button class="icon-btn" id="deleteBtn" title="Delete conversation" hidden>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
          </svg>
        </button>
      </header>

      <div class="messages" id="messages">
        <div class="empty-welcome">
          <div class="welcome-mark">✦</div>
          <h2>How can I help you today?</h2>
          <p>Ask me anything. I'll do my best.</p>
        </div>
      </div>

      <div class="composer">
        <form id="composerForm" autocomplete="off">
          <textarea
            id="messageInput"
            placeholder="Message Chatbot…"
            rows="1"
          ></textarea>
          <button type="submit" class="send-btn" id="sendBtn" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </form>
        <div class="composer-hint">Press <kbd>Enter</kbd> to send, <kbd>Shift</kbd>+<kbd>Enter</kbd> for new line</div>
      </div>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
